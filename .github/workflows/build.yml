name: Build and Push Frontend Image

on:
  push:
    branches: [main]
    paths:
      - version.txt
      - Dockerfile
      - nginx.conf
      - .github/workflows/build.yml
  workflow_dispatch:
    inputs:
      maxun_version:
        description: "Maxun version to build (overrides version.txt, e.g. 0.0.35)"
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.maxun_version }}" ]; then
            VERSION="${{ github.event.inputs.maxun_version }}"
          else
            VERSION=$(cat version.txt | tr -d '[:space:]')
          fi
          echo "maxun_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Maxun v$VERSION"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.maxun_version }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MAXUN_VERSION=${{ steps.version.outputs.maxun_version }}
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
            VITE_PUBLIC_URL=${{ secrets.VITE_PUBLIC_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
